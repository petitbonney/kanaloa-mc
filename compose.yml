volumes:
  data:
  backups:
---
services:
  ##### Filebrowser #####
  filebrowser:
    image: filebrowser/filebrowser
    restart: always
    ports:
      - 8080:80
    volumes:
      - data:/srv

  ##### Backup #####
  backups:
    image: itzg/mc-backup
    depends_on:
      mc:
        condition: service_healthy
    volumes:
      - data:/data:ro
      - backups:/backups
    environment:
      BACKUP_INTERVAL: 24h
      PRUNE_BACKUPS_COUNT: 7
      SRC_DIR: /data
      DEST_DIR: /backups
      RCON_HOST: mc
      INITIAL_DELAY: 0

  ##### Minecraft Server #####
  mc:
    image: itzg/minecraft-server
    restart: always
    tty: true
    stdin_open: true
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - 25565:25565
      - 24454:24454/udp
    volumes:
      - data:/data
    environment:
      EULA: true

      # General
      INIT_MEMORY: 8G
      MAX_MEMORY: 16G
      USE_AIKAR_FLAGS: true
      SNOOPER_ENABLED: false

      # Server
      SERVER_NAME: Kanaloa MC
      MOTD: §l§sKanaloa MC
      ICON: https://raw.githubusercontent.com/petitbonney/kanaloa-mc/refs/heads/master/assets/icon.png
      TYPE: NEOFORGE
      VERSION: 1.21.1
      NEOFORGE_VERSION: 21.1.173
      MODE: survival
      DIFFICULTY: hard
      SEED: -6384763642905229396
      FORCE_GAMEMODE: true
      SPAWN_PROTECTION: 0
      VIEW_DISTANCE: 8
      PLAYER_IDLE_TIMEOUT: 10 # minutes
      MAX_TICK_TIME: -1
      ALLOW_NETHER: false

      # Whitelist
      ENABLE_WHITELIST: true
      WHITELIST: petitbonney

      # Auto OP
      OPS: petitbonney

      # Auto-Pause
      ENABLE_AUTOPAUSE: true
      AUTOPAUSE_TIMEOUT_EST: 600 # seconds

      # Starting commands
      RCON_CMDS_STARTUP: |-
        gamerule doFireTick false
        gamerule mobGriefing false
        gamerule playersSleepingPercentage 25
        chunky start world circle 0 0 200

      # Mods
      MODRINTH_DOWNLOAD_DEPENDENCIES: required
      MODRINTH_ALLOWED_VERSION_TYPE: alpha
      MODRINTH_PROJECTS: |-
        balm:21.0.46+neoforge-1.21.1
        iceberg
        prism-lib
        ae2
        ai-improvements
        applied-energistics-2-wireless-terminals
        automodpack
        c2me-neoforge
        camera-mod
        chunky
        corpse
        create
        create-stuff-additions
        creeper-overhaul
        ct-overhaul-village
        enderman-overhaul
        ferrite-core
        golem-overhaul
        jei
        leaves-be-gone
        lithium
        lootr
        macaws-bridges
        macaws-doors
        macaws-fences-and-walls
        macaws-furniture
        macaws-lights-and-lamps
        macaws-paths-and-pavings
        macaws-roofs
        macaws-trapdoors
        macaws-windows
        modernfix
        noisium
        polymorph
        security-craft
        servercore
        scalablelux
        simple-voice-chat
        sophisticated-backpacks
        terrablender
        terralith
        too-fast
        travelersbackpack
        waystones
        yungs-better-desert-temples
        yungs-better-dungeons
        yungs-better-end-island
        yungs-better-jungle-temples
        yungs-better-mineshafts
        yungs-better-nether-fortresses
        yungs-better-ocean-monuments
        yungs-better-strongholds
        yungs-better-witch-huts
        yungs-bridges
